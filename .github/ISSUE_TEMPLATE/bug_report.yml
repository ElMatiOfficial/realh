name: Bug report
description: Something isn't working as documented
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        **Do not use this template for security issues.** Follow [SECURITY.md](../SECURITY.md) instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. Include payloads, curl commands, or code snippets.
      placeholder: |
        1. Start server with `npm run dev:server`
        2. POST /api/v1/credentials/issue with body `{...}`
        3. Observe response
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full error messages, stack traces, and relevant server logs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      placeholder: e.g. 0.1.0 or a1b2c3d
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - DEMO_MODE=true (in-memory)
        - DEMO_MODE=false (Firebase / Firestore)
        - Not applicable
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14.2, Ubuntu 22.04, Windows 11
  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-filing checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability.
          required: true
