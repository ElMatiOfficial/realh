version: 2
updates:
  # NPM — one entry at the repo root. With npm workspaces, Dependabot scans
  # workspace packages from here, so do NOT add separate entries for
  # /packages/server and /packages/client. That produces duplicate PRs for
  # every dep.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    # Pin security-sensitive deps to major-version PRs only, reviewed manually.
    ignore:
      - dependency-name: jose
        update-types: ["version-update:semver-major"]
      - dependency-name: firebase-admin
        update-types: ["version-update:semver-major"]
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions — root-level workflows only.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci

  # Docker — one entry per Dockerfile (these are not workspace-aware).
  - package-ecosystem: docker
    directory: "/packages/server"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: "/packages/client"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
