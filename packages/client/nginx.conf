server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: every non-file route resolves to index.html so client-side
  # routing works on hard refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed build assets; never cache the entry HTML.
  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # Baseline security headers. The API hosts its own helmet config; this
  # covers the static SPA surface.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Hide nginx version on errors.
  server_tokens off;
}
